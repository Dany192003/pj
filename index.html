<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Calendario | Pastoral Juvenil</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/calendar.css">
</head>
<body>

<div class="app">
    <div class="header">
        <h1>🏛️ Pastoral Juvenil</h1>
        <p>Calendario de Actividades y Pagos - Sumpango</p>
        <div class="user-actions">
            <button class="btn-login" id="btnAdminLogin">🔐 Acceso Administrador</button>
        </div>
    </div>

    <!-- Calendario -->
    <div class="calendar-container">
        <div class="calendar-header">
            <button class="calendar-nav" id="prevMonth">◀</button>
            <h2 id="currentMonthYear">Abril 2026</h2>
            <button class="calendar-nav" id="nextMonth">▶</button>
        </div>
        
        <div class="calendar-weekdays">
            <span>Dom</span><span>Lun</span><span>Mar</span><span>Mié</span><span>Jue</span><span>Vie</span><span>Sáb</span>
        </div>
        
        <div class="calendar-days" id="calendarDays">
            <!-- Días del calendario se generan con JS -->
        </div>
    </div>

    <!-- Lista de próximos pagos -->
    <div class="upcoming-payments">
        <h3>📅 Próximos Pagos Pendientes</h3>
        <div class="payments-list" id="paymentsList">
            <!-- Lista de pagos pendientes -->
        </div>
    </div>

    <!-- Modal de login -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>🔐 Acceso Administrador</h3>
            <input type="password" id="adminPassword" placeholder="Contraseña" class="modal-input">
            <button id="btnLogin" class="btn-main">Ingresar</button>
            <p class="error-msg" id="loginError"></p>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/database-cloud.js"></script>
<script src="js/auth.js"></script>
<script src="js/calendar.js"></script>
<script src="js/app.js"></script>
</body>
</html>
