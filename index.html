<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0891b2">
    <title>Pastoral Juvenil | Calendario</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

<div class="app">
    <!-- Hero Section con Logo -->
    <div class="hero">
        <div class="hero-badge">📅 Año 2026</div>
        <div class="hero-logo">
            <img src="img/logo.jpg" alt="Parroquia San Agustín Sumpango" class="hero-logo-img">
        </div>
        <h1>Pastoral Juvenil</h1>
        <p>Parroquia San Agustín - Sumpango</p>
    </div>

    <!-- Botones de acción -->
    <div class="actions-container">
        <button class="action-btn action-btn-primary" id="btnConsultaPagos">
            <span>📋</span>
            <span>Consultar Pagos de mi Grupo</span>
            <span>→</span>
        </button>
    </div>

    <!-- Calendario -->
    <div class="calendar-container">
        <div class="calendar-header">
            <button class="calendar-nav" id="prevMonth">◀</button>
            <h2 id="currentMonthYear">Abril 2026</h2>
            <button class="calendar-nav" id="nextMonth">▶</button>
        </div>
        <div class="calendar-weekdays">
            <span>Dom</span><span>Lun</span><span>Mar</span><span>Mié</span><span>Jue</span><span>Vie</span><span>Sáb</span>
        </div>
        <div class="calendar-days" id="calendarDays"></div>
    </div>

    <!-- Footer con acceso admin -->
    <div class="footer">
        <div class="footer-text">
            📌 Actividades programadas por la Pastoral Juvenil - Parroquia San Agustín Sumpango
        </div>
        <div class="footer-links">
            <button class="footer-link admin-link" id="btnAdminLogin">
                <span>🔐</span>
                <span>Acceso administrador</span>
            </button>
        </div>
    </div>

    <!-- Modal Login -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div style="font-size: 48px; margin-bottom: 16px;">🔐</div>
            <h3>Acceso Administrador</h3>
            <p style="color: #64748b; font-size: 13px; margin-bottom: 24px;">Ingresa tu contraseña para continuar</p>
            <input type="password" id="adminPassword" placeholder="Contraseña" class="modal-input">
            <button id="btnLogin" class="btn-main">Ingresar al Panel</button>
            <p class="error-msg" id="loginError"></p>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/database-cloud.js"></script>
<script src="js/auth.js"></script>
<script src="js/calendar.js"></script>
<script src="js/app.js"></script>
</body>
</html>
