<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0891b2">
    <title>Consultar Pagos | Pastoral Juvenil</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .consulta-container {
            max-width: 100%;
            margin: 0 auto;
        }
        .grupos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .grupo-card {
            background: white;
            border-radius: 20px;
            padding: 25px 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            text-align: center;
        }
        .grupo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            border-color: #0891b2;
            background: #f0f9ff;
        }
        .grupo-nombre {
            font-size: 18px;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 8px;
        }
        .grupo-info {
            font-size: 12px;
            color: #64748b;
        }
        .year-selector {
            background: white;
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .year-selector select {
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            font-size: 16px;
            font-weight: 600;
            background: #f8fafc;
        }
        .pagos-table-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            overflow-x: auto;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .pagos-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }
        .pagos-table th, .pagos-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }
        .pagos-table th {
            background: #f8fafc;
            color: #0891b2;
            font-weight: 700;
        }
        .status-pagado {
            color: #15803d;
            font-weight: 700;
            background: #dcfce7;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .status-pendiente {
            color: #f97316;
            font-weight: 700;
            background: #fef9c3;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .back-btn {
            background: #64748b;
            margin-bottom: 20px;
            width: auto;
            padding: 8px 20px;
        }
        .resumen-pagos {
            margin-top: 15px;
            padding: 10px;
            background: #f0fdf4;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            position: relative;
        }
        .close {
            position: absolute;
            right: 15px;
            top: 10px;
            font-size: 28px;
            cursor: pointer;
        }
        @media (max-width: 640px) {
            .grupos-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }
        }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="hero-logo" style="margin-bottom: 10px;">
            <img src="img/logo.png" alt="Logo" style="width: 60px; border-radius: 15px;">
        </div>
        <h1>🏛️ Pastoral Juvenil</h1>
        <p>Consulta de Pagos por Grupo - Parroquia San Agustín Sumpango</p>
        <button class="btn-main back-btn" id="btnVolver" style="width: auto;">← Volver al Calendario</button>
    </div>

    <div class="consulta-container">
        <div id="gruposList" class="grupos-grid"></div>

        <div id="passwordModal" class="modal">
            <div class="modal-content">
                <span class="close" id="closePasswordModal">&times;</span>
                <h3>🔐 Ingrese la contraseña del grupo</h3>
                <input type="password" id="grupoPassword" placeholder="Contraseña" class="modal-input" style="width:100%; padding:12px; margin:15px 0; border-radius:10px; border:1px solid #cbd5e1;">
                <button id="btnVerificarPassword" class="btn-main">Verificar</button>
                <p class="error-msg" id="passwordError" style="color:#ef4444; font-size:12px; margin-top:10px;"></p>
            </div>
        </div>

        <div id="pagosView" style="display:none;">
            <div class="year-selector">
                <label>📅 Seleccionar Año:</label>
                <select id="anioSelector">
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                    <option value="2026" selected>2026</option>
                    <option value="2027">2027</option>
                    <option value="2028">2028</option>
                    <option value="2029">2029</option>
                    <option value="2030">2030</option>
                </select>
            </div>
            <div class="pagos-table-container">
                <h3 id="grupoSeleccionadoTitle" style="margin-bottom: 15px;"></h3>
                <table class="pagos-table">
                    <thead><tr><th>Mes</th><th>Estado</th></tr></thead>
                    <tbody id="pagosTableBody"></tbody>
                </table>
                <div class="resumen-pagos" id="resumenPagos"></div>
            </div>
            <button class="btn-main back-to-groups" id="btnBackToGroups" style="margin-top: 20px; background: #64748b;">← Volver a Grupos</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/database-cloud.js"></script>
<script src="js/consulta.js"></script>
</body>
</html>
