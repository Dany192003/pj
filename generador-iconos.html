<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Iconos - Pastoral Juvenil</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #0891b2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #0f172a, #0891b2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        
        h2 {
            font-size: 18px;
            color: #64748b;
            margin-bottom: 24px;
            font-weight: 500;
        }
        
        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
        }
        
        .upload-area:hover {
            border-color: #0891b2;
            background: #f0f9ff;
        }
        
        .upload-area.drag-over {
            border-color: #0891b2;
            background: #e0f2fe;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .preview-area {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 24px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 20px;
            justify-content: center;
        }
        
        .preview-item {
            text-align: center;
        }
        
        .preview-img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid #e2e8f0;
            margin-bottom: 8px;
        }
        
        .preview-label {
            font-size: 11px;
            color: #64748b;
        }
        
        .download-btn {
            background: linear-gradient(135deg, #0891b2, #3b82f6);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }
        
        .download-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .code-section {
            margin-top: 24px;
            padding: 20px;
            background: #1e293b;
            border-radius: 16px;
            display: none;
        }
        
        .code-section h3 {
            color: #f1f5f9;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .code-section pre {
            background: #0f172a;
            padding: 16px;
            border-radius: 12px;
            overflow-x: auto;
            color: #e2e8f0;
            font-family: monospace;
            font-size: 12px;
        }
        
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 13px;
            display: none;
        }
        
        .status.success {
            background: #dcfce7;
            color: #15803d;
            display: block;
        }
        
        .status.error {
            background: #fee2e2;
            color: #dc2626;
            display: block;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 16px;
            display: none;
        }
        
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #0891b2, #3b82f6);
            transition: width 0.3s;
        }
        
        .sizes-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 16px 0;
            justify-content: center;
        }
        
        .size-badge {
            background: #f1f5f9;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Generador de Iconos</h1>
        <h2>Para iPad, iPhone, Android y todos los dispositivos</h2>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📸</div>
            <p>Arrastra o haz clic para subir tu logo</p>
            <p style="font-size: 12px; color: #94a3b8; margin-top: 8px;">PNG, JPG o JPEG - Recomendado: Cuadrado</p>
            <input type="file" id="fileInput" accept="image/png,image/jpeg,image/jpg" style="display: none;">
        </div>
        
        <div class="preview-area" id="previewArea" style="display: none;">
            <!-- Preview de tamaños -->
        </div>
        
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="status" id="status"></div>
        
        <button class="download-btn" id="downloadBtn" disabled>⬇️ Descargar todos los iconos</button>
        
        <div class="code-section" id="codeSection">
            <h3>📋 Código para copiar en el <head> de cada HTML:</h3>
            <pre id="codeBlock"></pre>
            <button id="copyCodeBtn" style="margin-top: 12px; background: #0891b2; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer;">📋 Copiar código</button>
        </div>
    </div>
    
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewArea = document.getElementById('previewArea');
        const downloadBtn = document.getElementById('downloadBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const statusDiv = document.getElementById('status');
        const codeSection = document.getElementById('codeSection');
        const codeBlock = document.getElementById('codeBlock');
        const copyCodeBtn = document.getElementById('copyCodeBtn');
        
        let originalImage = null;
        let generatedIcons = {};
        
        // Tamaños necesarios para todos los dispositivos
        const sizes = [
            { size: 16, name: 'favicon-16x16.png', type: 'favicon' },
            { size: 32, name: 'favicon-32x32.png', type: 'favicon' },
            { size: 48, name: 'favicon-48x48.png', type: 'favicon' },
            { size: 64, name: 'favicon-64x64.png', type: 'favicon' },
            { size: 96, name: 'favicon-96x96.png', type: 'favicon' },
            { size: 180, name: 'apple-touch-icon.png', type: 'apple' },
            { size: 192, name: 'android-chrome-192x192.png', type: 'android' },
            { size: 512, name: 'android-chrome-512x512.png', type: 'android' }
        ];
        
        // Eventos de arrastrar y soltar
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                processImage(file);
            } else {
                showStatus('Por favor, sube un archivo de imagen válido', 'error');
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                processImage(file);
            }
        });
        
        function processImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    showPreview(img);
                    generateAllIcons(img);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        function showPreview(img) {
            previewArea.style.display = 'flex';
            previewArea.innerHTML = '';
            
            // Mostrar vista previa de algunos tamaños
            const previewSizes = [32, 64, 180, 512];
            previewSizes.forEach(size => {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, size, size);
                
                const div = document.createElement('div');
                div.className = 'preview-item';
                div.innerHTML = `
                    <img src="${canvas.toDataURL()}" class="preview-img" style="width: ${Math.min(size, 64)}px; height: ${Math.min(size, 64)}px;">
                    <div class="preview-label">${size}x${size}</div>
                `;
                previewArea.appendChild(div);
            });
        }
        
        async function generateAllIcons(img) {
            progressBar.style.display = 'block';
            downloadBtn.disabled = true;
            generatedIcons = {};
            
            for (let i = 0; i < sizes.length; i++) {
                const { size, name } = sizes[i];
                const progress = ((i + 1) / sizes.length) * 100;
                progressFill.style.width = `${progress}%`;
                
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                
                // Dibujar la imagen redimensionada
                ctx.drawImage(img, 0, 0, size, size);
                
                // Convertir a PNG
                const pngData = canvas.toDataURL('image/png');
                generatedIcons[name] = pngData;
                
                // Pequeña pausa para que se vea el progreso
                await new Promise(resolve => setTimeout(resolve, 50));
            }
            
            progressFill.style.width = '100%';
            setTimeout(() => {
                progressBar.style.display = 'none';
                downloadBtn.disabled = false;
                showStatus('✅ ¡Iconos generados correctamente! Haz clic en "Descargar todos los iconos"', 'success');
                
                // Mostrar código HTML
                showHTMLCode();
            }, 500);
        }
        
        function showHTMLCode() {
            const htmlCode = `<!-- Favicon para todos los dispositivos (iPad, iPhone, Android, Desktop) -->
<link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="48x48" href="img/favicon-48x48.png">
<link rel="icon" type="image/png" sizes="64x64" href="img/favicon-64x64.png">
<link rel="icon" type="image/png" sizes="96x96" href="img/favicon-96x96.png">
<link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<meta name="msapplication-TileColor" content="#0891b2">
<meta name="theme-color" content="#0891b2">

<!-- Para iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pastoral Juvenil">

<!-- Para Android -->
<meta name="mobile-web-app-capable" content="yes">`;
            
            codeBlock.textContent = htmlCode;
            codeSection.style.display = 'block';
        }
        
        copyCodeBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(codeBlock.textContent);
            showStatus('✅ Código copiado al portapapeles', 'success');
            setTimeout(() => {
                if (statusDiv.classList.contains('success')) {
                    statusDiv.style.display = 'none';
                }
            }, 2000);
        });
        
        downloadBtn.addEventListener('click', () => {
            if (Object.keys(generatedIcons).length === 0) return;
            
            // Crear un archivo ZIP con todos los iconos
            showStatus('📦 Creando archivo ZIP...', 'success');
            
            // Usar JSZip para crear el ZIP
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
            script.onload = () => {
                const zip = new JSZip();
                
                for (const [name, dataUrl] of Object.entries(generatedIcons)) {
                    // Convertir dataURL a blob
                    const byteString = atob(dataUrl.split(',')[1]);
                    const mimeString = dataUrl.split(',')[0].split(':')[1].split(';')[0];
                    const ab = new ArrayBuffer(byteString.length);
                    const ia = new Uint8Array(ab);
                    for (let i = 0; i < byteString.length; i++) {
                        ia[i] = byteString.charCodeAt(i);
                    }
                    const blob = new Blob([ab], { type: mimeString });
                    zip.file(name, blob);
                }
                
                // Agregar archivo manifest
                const manifest = {
                    name: "Pastoral Juvenil",
                    short_name: "Pastoral",
                    description: "Pastoral Juvenil - Parroquia San Agustín Sumpango",
                    icons: [
                        { src: "img/android-chrome-192x192.png", sizes: "192x192", type: "image/png" },
                        { src: "img/android-chrome-512x512.png", sizes: "512x512", type: "image/png" }
                    ],
                    theme_color: "#0891b2",
                    background_color: "#ffffff",
                    display: "standalone",
                    start_url: "/"
                };
                
                zip.file("site.webmanifest", JSON.stringify(manifest, null, 2));
                
                zip.generateAsync({ type: "blob" }).then((content) => {
                    const link = document.createElement('a');
                    const url = URL.createObjectURL(content);
                    link.href = url;
                    link.download = 'iconos-pastoral.zip';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                    showStatus('✅ ¡Iconos descargados! Extrae el ZIP y copia los archivos a la carpeta img/', 'success');
                });
            };
            document.head.appendChild(script);
        });
        
        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            setTimeout(() => {
                if (statusDiv.classList.contains(type)) {
                    setTimeout(() => {
                        statusDiv.style.display = 'none';
                    }, 3000);
                }
            }, 3000);
        }
    </script>
</body>
</html>
